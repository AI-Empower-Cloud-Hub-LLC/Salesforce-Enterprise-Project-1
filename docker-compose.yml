version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesforce-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://salesforce_user:salesforce_password@postgres:5432/salesforce_db
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
      - INTEGRATION_REGISTRY_CONFIG=/app/config/integrations.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - salesforce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: salesforce-postgres
    environment:
      POSTGRES_DB: salesforce_db
      POSTGRES_USER: salesforce_user
      POSTGRES_PASSWORD: salesforce_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - salesforce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesforce_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "log_statement=all"

  redis:
    image: redis:7-alpine
    container_name: salesforce-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - salesforce-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:latest
    container_name: salesforce-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - salesforce-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  salesforce-network:
    driver: bridge
