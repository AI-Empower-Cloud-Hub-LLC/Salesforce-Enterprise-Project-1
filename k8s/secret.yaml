apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: salesforce-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql://salesforce_user:salesforce_password@postgres.salesforce-platform.svc.cluster.local:5432/salesforce_db"
  REDIS_URL: "redis://redis.salesforce-platform.svc.cluster.local:6379/0"
  SALESFORCE_CLIENT_ID: "INSERT_SALESFORCE_CLIENT_ID"
  SALESFORCE_CLIENT_SECRET: "INSERT_SALESFORCE_CLIENT_SECRET"
  SALESFORCE_ORG_ID: "INSERT_SALESFORCE_ORG_ID"
  AWS_ACCESS_KEY_ID: "INSERT_AWS_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "INSERT_AWS_SECRET_KEY"
  VAULT_ADDR: "INSERT_VAULT_ADDRESS"
  VAULT_TOKEN: "INSERT_VAULT_TOKEN"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: salesforce-platform
type: Opaque
stringData:
  POSTGRES_DB: "salesforce_db"
  POSTGRES_USER: "salesforce_user"
  POSTGRES_PASSWORD: "INSERT_SECURE_PASSWORD"
