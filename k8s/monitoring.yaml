apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: salesforce-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        cluster: salesforce-platform
        environment: production

    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093

    rule_files:
    - /etc/prometheus/rules/*.yml

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets:
        - localhost:9090

    - job_name: api
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - salesforce-platform
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: api
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

    - job_name: postgres
      static_configs:
      - targets:
        - postgres-exporter:9187

    - job_name: redis
      static_configs:
      - targets:
        - redis-exporter:9121

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: salesforce-platform
data:
  rules.yml: |
    groups:
    - name: api-rules
      interval: 30s
      rules:
      - alert: HighErrorRate
        expr: rate(api_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: High error rate detected
          description: API error rate is {{ $value | humanizePercentage }}

      - alert: HighLatency
        expr: histogram_quantile(0.95, api_request_duration_seconds_bucket) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High request latency
          description: P95 latency is {{ $value }}s

      - alert: PodRestartingTooOften
        expr: rate(kube_pod_container_status_restarts_total[1h]) > 0.1
        labels:
          severity: warning
        annotations:
          summary: Pod restarting too often
          description: Pod {{ $labels.pod }} restarting frequently

      - alert: DatabaseConnectionPoolExhausted
        expr: database_connection_pool_usage > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Database connection pool nearly exhausted
          description: Pool usage is {{ $value | humanizePercentage }}

      - alert: WorkflowStuck
        expr: workflow_execution_duration_seconds > 3600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Workflow stuck for over 1 hour
          description: Workflow {{ $labels.workflow_id }} stuck

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-monitor
  namespace: salesforce-platform
  labels:
    app: api
spec:
  selector:
    matchLabels:
      app: api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: salesforce-platform
spec:
  type: ClusterIP
  ports:
  - name: prometheus
    port: 9090
    targetPort: 9090
  selector:
    app: prometheus

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: salesforce-platform
spec:
  type: ClusterIP
  ports:
  - name: grafana
    port: 3000
    targetPort: 3000
  selector:
    app: grafana

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: salesforce-platform
spec:
  type: ClusterIP
  ports:
  - name: alertmanager
    port: 9093
    targetPort: 9093
  selector:
    app: alertmanager
